# alembic.ini — Alembic configuration for Security Buddy API
# The database URL is NOT set here; it is injected by env.py from Pydantic settings.

[alembic]
# Path to migration scripts, relative to this file
script_location = alembic

# Migration file naming: zero-padded 4-digit sequence + short description
# e.g. 0001_baseline.py, 0002_core_schema.py
file_template = %%(rev)s_%%(slug)s

# Timezone for revision timestamps
timezone = UTC

# Prepend sys.path with this path (so 'src' is importable)
prepend_sys_path = .

# Template used to generate migration file names; slug comes from -m argument
# revision_environment = false

[post_write_hooks]
# No post-write hooks for MVP

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
