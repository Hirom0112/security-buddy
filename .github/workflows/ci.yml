name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: security_buddy
          POSTGRES_PASSWORD: security_buddy
          POSTGRES_DB: security_buddy
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U security_buddy"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://security_buddy:security_buddy@localhost:5432/security_buddy
      REDIS_URL: redis://localhost:6379/0
      OPENROUTER_API_KEY: ci-stub-no-network-calls
      LANGSMITH_API_KEY: DISABLED
      LANGSMITH_PROJECT: security-buddy-ci
      SESSION_SECRET: ci-session-secret-32-bytes-minimum-len
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"
          enable-cache: true
          cache-dependency-glob: apps/api/uv.lock

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: ruff check
        run: uv run ruff check src tests

      - name: ruff format check
        run: uv run ruff format --check src tests

      - name: mypy strict
        run: uv run mypy src

      - name: import-linter
        run: uv run lint-imports

      - name: alembic upgrade head
        run: uv run alembic upgrade head

      - name: pytest unit + integration (no eval marker)
        run: uv run pytest tests/unit tests/integration -v --maxfail=1

  ui:
    name: UI (Node/Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ui
    env:
      OPERATOR_PASSWORD: ci-test-password
      SESSION_SECRET: ci-session-secret-32-bytes-minimum-len
      DATABASE_URL: postgresql://security_buddy:security_buddy@localhost:5432/security_buddy
      API_BASE_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: apps/ui/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: typecheck
        run: pnpm typecheck

      - name: lint
        run: pnpm lint

      - name: unit tests
        run: pnpm test

      - name: production build
        run: pnpm build
